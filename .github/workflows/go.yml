# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main", "refactor", "atavism/payment-redirect-test" ]
  # No branch filter here — run CI on every pull request regardless of target
  # branch. This catches PRs aimed at refactor, feature branches, or anything
  # else, not just main. The previous filter ("branches: [ main ]") silently
  # skipped CI for PRs into refactor, which is our active dev branch.
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      run_staging_payment_redirect:
        description: "Run staging payment redirect integration contract test"
        required: false
        type: boolean
        default: false
      payment_redirect_plan_id:
        description: "Optional staging plan ID; if blank, the test fetches one from /plans-v5"
        required: false
        type: string
        default: ""
      payment_redirect_channel:
        description: "Plans channel used when plan ID is not supplied"
        required: false
        type: string
        default: "non-store"
      payment_redirect_provider:
        description: "Payment provider to request"
        required: false
        type: string
        default: "stripe"

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: "go.mod"

    - name: Check for slog overwrite calls in tests
      run: |
        if grep -rn 'slog\.SetDefault\|slog\.SetLogLoggerLevel' --include='*_test.go' .; then
          echo "::error::Test files should not upate the slog.Default logger or level. This pollutes the output."
          exit 1
        fi

    - name: Build
      run: go build -v -tags with_clash_api ./...
    - name: Test
      run: go test -v -tags with_clash_api ./...

  staging-payment-redirect:
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && inputs.run_staging_payment_redirect) ||
        (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-staging-payment-redirect')) ||
        (github.event_name == 'push' && github.ref == 'refs/heads/atavism/payment-redirect-test')
      }}
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: "go.mod"

    - name: Run staging payment redirect contract test
      env:
        RADIANCE_ENV: staging
        RADIANCE_RUN_STAGING_PAYMENT_REDIRECT: "1"
        RADIANCE_PAYMENT_REDIRECT_PLAN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.payment_redirect_plan_id || '' }}
        RADIANCE_PAYMENT_REDIRECT_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.payment_redirect_channel || 'non-store' }}
        RADIANCE_PAYMENT_REDIRECT_PROVIDER: ${{ github.event_name == 'workflow_dispatch' && inputs.payment_redirect_provider || 'stripe' }}
      run: go test -v -tags integration ./account -run TestStagingPaymentRedirectIdempotency -count=1
